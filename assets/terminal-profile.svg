<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="540">
      <stop offset="0%" stop-color="#05070D"/>
      <stop offset="55%" stop-color="#070B14"/>
      <stop offset="100%" stop-color="#11051A"/>
    </linearGradient>
    <linearGradient id="terminalLine" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#B026FF"/>
    </linearGradient>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00E5FF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="540" rx="22" fill="url(#background)"/>
  <rect width="1200" height="540" rx="22" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1197" height="537" rx="20.5" stroke="url(#terminalLine)" stroke-width="3" stroke-opacity="0.75"/>

  <rect x="1" y="1" width="1198" height="62" rx="21" fill="#0B1020"/>
  <rect x="1" y="43" width="1198" height="20" fill="#0B1020"/>
  <circle cx="34" cy="31" r="8" fill="#FF5F56"/>
  <circle cx="60" cy="31" r="8" fill="#FFBD2E"/>
  <circle cx="86" cy="31" r="8" fill="#27C93F"/>

  <text x="600" y="37" fill="#94A3B8" font-size="17" font-family="monospace" text-anchor="middle">bi0punk@github: ~/workspace</text>
  <text x="50" y="112" fill="#39FF14" font-size="22" font-family="monospace" filter="url(#greenGlow)">┌──(bi0punk㉿github)-[~/workspace]</text>
  <text x="50" y="148" fill="#39FF14" font-size="22" font-family="monospace" filter="url(#greenGlow)">└─$ ./profile --initialize</text>

  <text x="50" y="205" fill="#00E5FF" font-size="58" font-weight="700" font-family="monospace" filter="url(#cyanGlow)">BI0PUNK</text>
  <text x="50" y="248" fill="#B026FF" font-size="25" font-family="monospace">Cybersecurity • DevOps • Automation • Applied AI</text>
  <line x1="50" y1="278" x2="1150" y2="278" stroke="url(#terminalLine)" stroke-width="2" stroke-opacity="0.7"/>

  <text x="50" y="326" fill="#94A3B8" font-size="19" font-family="monospace">STATUS</text>
  <text x="175" y="326" fill="#39FF14" font-size="19" font-family="monospace">ONLINE</text>

  <text x="50" y="365" fill="#94A3B8" font-size="19" font-family="monospace">FOCUS</text>
  <text x="175" y="365" fill="#FFFFFF" font-size="19" font-family="monospace">Secure infrastructure and intelligent automation</text>

  <text x="50" y="404" fill="#94A3B8" font-size="19" font-family="monospace">STACK</text>
  <text x="175" y="404" fill="#00E5FF" font-size="19" font-family="monospace">Python • Linux • Docker • Ansible • OpenCV • LangGraph</text>

  <text x="50" y="443" fill="#94A3B8" font-size="19" font-family="monospace">MODE</text>
