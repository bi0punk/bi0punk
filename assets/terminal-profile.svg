  <text x="50" y="500" fill="#39FF14" font-size="18" font-family="monospace" filter="url(#greenGlow)">root@bi0punk:~#</text>
  <rect x="230" y="483" width="12" height="22" fill="#39FF14">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
